<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RANNI</title>
  <link rel="stylesheet" href="css/hud.css">
  <link rel="stylesheet" href="css/glitch.css">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: 'Courier New', monospace;
      color: #00f0ff;
    }
    #ranni-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }
    #hud-container {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      text-align: center;
      pointer-events: none;
    }
    #status-text {
      font-size: 14px;
      opacity: 0.7;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
    }
    #command-text {
      font-size: 18px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.3s;
      text-shadow: 0 0 15px #00f0ff;
    }
    #command-text.visible {
      opacity: 1;
    }
    #audio-indicator {
      position: fixed;
      top: 50%;
      right: 60px;
      transform: translateY(-50%);
      z-index: 1;
      width: 4px;
      height: 100px;
      background: rgba(0, 240, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    #audio-level {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 0%;
      background: linear-gradient(to top, #00f0ff, #0066ff);
      border-radius: 2px;
      transition: height 0.05s;
    }
    .corner-info {
      position: fixed;
      font-size: 11px;
      opacity: 0.3;
      letter-spacing: 2px;
      z-index: 1;
      pointer-events: none;
    }
    .corner-tl { top: 20px; left: 20px; }
    .corner-tr { top: 20px; right: 20px; text-align: right; }
    .corner-bl { bottom: 20px; left: 20px; }
    .corner-br { bottom: 20px; right: 20px; text-align: right; }
    #ring-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="ranni-canvas"></canvas>

  <div class="corner-info corner-tl">RANNI // v1.0</div>
  <div class="corner-info corner-tr" id="time-display">--:--:--</div>
  <div class="corner-info corner-bl">SYS // ONLINE</div>
  <div class="corner-info corner-br" id="status-corner">IDLE</div>

  <div id="hud-container">
    <div id="status-text">ESPERANDO COMANDO</div>
    <div id="command-text"></div>
  </div>

  <div id="audio-indicator">
    <div id="audio-level"></div>
  </div>

  <script>window.THREE = require('three');</script>
  <script src="js/shaders/sphere_shader.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/ranni-3d.js"></script>
</body>
</html>
